
    <div class="relative w-full">
      <!-- Label -->
      <label [for]="inputId" class="block text-sm font-medium text-petrol mb-1.5">
        {{ label }}
        @if (required) {
          <span class="text-red-500">*</span>
        }
      </label>

      <!-- Input Field -->
      <input
        [id]="inputId"
        [type]="type"
        [formControl]="internalControl!"
        [value]="value"
        (focus)="onFocus()"
        (blur)="onBlur()"
        (input)="onInput($event)"
        class="
          w-full
          px-4
          py-2.5
          text-petrol
          bg-white
          border
          rounded-xl
          outline-none
          transition-all
          duration-200
          disabled:bg-cream
          disabled:text-stone
          disabled:cursor-not-allowed
          placeholder:text-stone/50
        "
        [class.border-warm-border]="!isFocused && !hasError"
        [class.border-petrol]="isFocused && !hasError"
        [class.border-red-500]="hasError"
        [class.ring-2]="isFocused || hasError"
        [class.ring-petrol/10]="isFocused && !hasError"
        [class.ring-red-500/10]="hasError"
        [class.bg-sand]="disabled"
        [disabled]="disabled"
        [readonly]="readonly"
        [min]="min"
        [max]="max"
        [step]="step"
        [minlength]="minlength"
        [maxlength]="maxlength"
        [pattern]="pattern!"
        [placeholder]="placeholder"
      />

      <!-- Mensaje de Error -->
      @if (hasError && errorMessage) {
        <p class="mt-1.5 text-xs text-red-600 flex items-center gap-1">
          <svg class="w-3.5 h-3.5" fill="currentColor" viewBox="0 0 20 20">
            <path
              fill-rule="evenodd"
              d="M18 10a8 8 0 11-16 0 8 8 0 0116 0zm-7 4a1 1 0 11-2 0 1 1 0 012 0zm-1-9a1 1 0 00-1 1v4a1 1 0 102 0V6a1 1 0 00-1-1z"
              clip-rule="evenodd"
            />
          </svg>
          {{ errorMessage }}
        </p>
      }

      <!-- Helper Text -->
      @if (helperText && !hasError) {
        <p class="mt-1.5 text-xs text-stone">{{ helperText }}</p>
      }
    </div>
